name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Compilacion
      id: compilacion
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Compilacion
        setup-command: ''
        command: javac src/Main.java
        timeout: 10
        max-score: 10
    - name: Ejecucion
      id: ejecucion
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Ejecucion
        setup-command: cd src
        command: java Main
        timeout: 10
        max-score: 10
    - name: Prueba
      id: prueba
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Prueba
        setup-command: chmod +x test/test.sh
        command: "./test/test.sh"
        timeout: 10
        max-score: 80
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        COMPILACION_RESULTS: "${{steps.compilacion.outputs.result}}"
        EJECUCION_RESULTS: "${{steps.ejecucion.outputs.result}}"
        PRUEBA_RESULTS: "${{steps.prueba.outputs.result}}"
      with:
        runners: compilacion,ejecucion,prueba
